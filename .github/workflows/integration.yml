name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm --filter @workspace/zafeer run test:integration
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          INTEGRATION_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          INTEGRATION_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          INTEGRATION_NOPERM_EMAIL: ${{ secrets.E2E_NOPERM_EMAIL }}
          INTEGRATION_NOPERM_PASSWORD: ${{ secrets.E2E_NOPERM_PASSWORD }}
