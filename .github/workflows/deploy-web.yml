name: Deploy Web (zafeer)

on:
  push:
    branches: [main]
    paths:
      - "artifacts/zafeer/src/**"
      - "artifacts/zafeer/public/**"
      - "artifacts/zafeer/index.html"
      - "artifacts/zafeer/package.json"
      - "artifacts/zafeer/vite.config.ts"
      - "artifacts/zafeer/tsconfig*.json"
      - "artifacts/zafeer/components.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "vercel.json"
      - "!artifacts/zafeer/src/test/**"
      - "!artifacts/zafeer/src/**/*.test.ts"
      - "!artifacts/zafeer/src/**/*.test.tsx"

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build zafeer
        working-directory: artifacts/zafeer
        run: pnpm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        run: |
          npx vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            -e VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            -e VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
