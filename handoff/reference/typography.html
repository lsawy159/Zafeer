<!doctype html><html><head><meta charset="utf-8"><title>Type Display</title>
<style>
@font-face { font-family: 'IBM Plex Sans Arabic'; font-weight: 400; src: url('../fonts/IBM_Plex_Sans_Arabic-Regular.woff2') format('woff2'); }
@font-face { font-family: 'IBM Plex Sans Arabic'; font-weight: 500; src: url('../fonts/IBM_Plex_Sans_Arabic-Medium.woff2') format('woff2'); }
@font-face { font-family: 'IBM Plex Sans Arabic'; font-weight: 600; src: url('../fonts/IBM_Plex_Sans_Arabic-SemiBold.woff2') format('woff2'); }
@font-face { font-family: 'IBM Plex Sans Arabic'; font-weight: 700; src: url('../fonts/IBM_Plex_Sans_Arabic-Bold.woff2') format('woff2'); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body{margin:0;padding:18px;background:#fff;color:#181c1e;font-family:Manrope,system-ui}
.row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px dashed #ebeef0}
.tag{font-size:10px;font-weight:600;color:#5b6076;width:64px;flex:0 0 64px}
.spec{font-size:10px;color:#9aa0b1;font-family:ui-monospace,monospace}
.s1{font-size:36px;font-weight:800;letter-spacing:-0.01em;line-height:1.1}
.s2{font-size:30px;font-weight:700;line-height:1.15}
.s3{font-size:24px;font-weight:700}
.s4{font-size:20px;font-weight:600}
.s5{font-size:18px;font-weight:600}
.b{font-size:16px}.s{font-size:14px;color:#5b6076}
</style></head><body>
<div class="row"><span class="tag">H1</span><span class="s1">لوحة التحكم</span><span class="spec">36/1.1 · 800 · -0.01em</span></div>
<div class="row"><span class="tag">H2</span><span class="s2">الموظفون</span><span class="spec">30/1.15 · 700</span></div>
<div class="row"><span class="tag">H3</span><span class="s3">إحصائيات العقود</span><span class="spec">24 · 700</span></div>
<div class="row"><span class="tag">H4</span><span class="s4">معدل الاستفادة</span><span class="spec">20 · 600</span></div>
<div class="row"><span class="tag">Body</span><span class="b">ملخص فوري للإحصائيات والتنبيهات.</span><span class="spec">16/1.5 · 400</span></div>
<div class="row"><span class="tag">Caption</span><span class="s">خلال 30 يوم</span><span class="spec">14 · 500 · muted</span></div>
</body></html>
