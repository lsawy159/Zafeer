<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>SawTracker · UI kit</title>
<link rel="icon" href="../../assets/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #f7fafc; color: #181c1e; font-family: 'IBM Plex Sans Arabic', Manrope, system-ui; -webkit-font-smoothing: antialiased; }
  button:focus-visible, input:focus-visible { outline: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; } ::-webkit-scrollbar-thumb { background: #d8dcde; border-radius: 9999px; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>

<script type="text/babel">
function App() {
  const [authed, setAuthed] = React.useState(false);
  const [page, setPage] = React.useState('dashboard');
  if (!authed) return <Login onSignIn={() => setAuthed(true)} />;
  const PageComp = { dashboard: Dashboard, employees: EmployeesPage, alerts: AlertsPage, settings: SettingsPage, general: SettingsPage }[page] || Dashboard;
  return <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
    <Header currentPage={page} onPageChange={setPage} />
    <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
      <Sidebar currentPage={page} onPageChange={setPage} />
      <main style={{ flex: 1, overflowY: 'auto', background: '#f7fafc' }}>
        <PageComp />
      </main>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
