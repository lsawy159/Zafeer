<!doctype html><html><head><meta charset="utf-8"><title>Stat cards</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;padding:14px;background:#f8fafc;font-family:'IBM Plex Sans Arabic',Manrope,system-ui;direction:rtl}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:14px;box-shadow:0 4px 16px hsl(222 47% 11%/.06),0 2px 4px hsl(222 47% 11%/.04);position:relative;overflow:hidden}
.card .bar{position:absolute;inset-inline-start:0;top:14px;bottom:14px;width:3px;border-radius:9999px}
.card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-inline-start:10px}
.card .ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;color:#0f172a}
.card .lab{font-size:11px;color:#475569;font-weight:500}
.card .num{font:800 28px Manrope;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#0f172a;padding-inline-start:10px;line-height:1.1}
.card .sub{font-size:11px;color:#475569;display:flex;align-items:center;gap:5px;margin-top:6px;padding-inline-start:10px}
.card.graphite .bar{background:#0f172a}
.card.mint .bar{background:#10b981}
.card.amber .bar{background:hsl(38 92% 50%)}
.card.red  .bar{background:hsl(0 72% 51%)}
.card.mint .ico{background:hsl(150 80% 94%);color:#047857}
.card.amber .ico{background:hsl(48 96% 89%);color:hsl(26 83% 24%)}
.card.red .ico{background:hsl(0 86% 94%);color:hsl(0 70% 28%)}
svg{width:16px;height:16px}
.up{color:#047857;font-weight:700;font-family:Manrope;font-variant-numeric:tabular-nums}
.dn{color:hsl(0 70% 35%);font-weight:700;font-family:Manrope;font-variant-numeric:tabular-nums}
.up::before{content:'▲ ';font-size:8px}
.dn::before{content:'▼ ';font-size:8px}
</style></head><body>
<div class="grid">
<div class="card graphite"><span class="bar"></span><div class="head"><span class="lab">إجمالي الموظفين</span><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg></span></div><div class="num">1,248</div><div class="sub"><span class="up">5.2%</span> هذا الشهر</div></div>

<div class="card mint"><span class="bar"></span><div class="head"><span class="lab">شركات مسجلة</span><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 22V12h6v10M3 9h18"/></svg></span></div><div class="num">42</div><div class="sub"><span class="up">3</span> جديدة</div></div>

<div class="card amber"><span class="bar"></span><div class="head"><span class="lab">تنبيهات عاجلة</span><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></span></div><div class="num">17</div><div class="sub">طارئة وعاجلة</div></div>

<div class="card red"><span class="bar"></span><div class="head"><span class="lab">منتهية الصلاحية</span><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg></span></div><div class="num">8</div><div class="sub"><span class="dn">إجراء فوري</span></div></div>
</div>
</body></html>
