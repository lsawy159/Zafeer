<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;padding:18px;background:#fff;font-family:Manrope,'IBM Plex Sans Arabic',system-ui;direction:rtl}
.btn{font:600 13px Manrope,'IBM Plex Sans Arabic';border-radius:9999px;padding:9px 18px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform 80ms;line-height:1}
.btn:active{transform:scale(.96)}
.primary{background:#0f172a;color:#fff;box-shadow:0 8px 24px hsl(217 33% 17%/.30)}
.primary:hover{background:#1f2937}
.mint{background:#10b981;color:#022c22;box-shadow:0 6px 20px hsl(160 84% 39%/.32)}
.mint:hover{background:#059669;color:#fff}
.secondary{background:#fff;color:#0f172a;border-color:#cbd5e1}
.secondary:hover{background:#f1f5f9;border-color:#94a3b8}
.ghost{background:transparent;color:#334155}
.ghost:hover{background:#f1f5f9}
.danger{background:hsl(0 72% 51%);color:#fff}
.danger:hover{background:hsl(0 74% 42%)}
.outline-mint{background:transparent;color:#047857;border-color:#10b981}
.outline-mint:hover{background:hsl(150 80% 94%)}
.icon-btn{width:38px;height:38px;border-radius:9999px;background:#fff;border:1px solid #e2e8f0;display:inline-flex;align-items:center;justify-content:center;color:#334155;cursor:pointer}
.icon-btn:hover{background:#f1f5f9;border-color:#cbd5e1;color:#0f172a}
.icon-btn.solid{background:#0f172a;color:#fff;border-color:transparent;box-shadow:0 4px 12px hsl(217 33% 17%/.25)}
.disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.lab{font:600 10px ui-monospace,monospace;color:#475569;width:74px}
svg{width:14px;height:14px}
</style></head><body>
<div class="row"><span class="lab">primary</span>
  <button class="btn primary">حفظ التغييرات</button>
  <button class="btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>إضافة موظف</button>
  <button class="btn primary disabled">جاري الحفظ…</button>
</div>
<div class="row"><span class="lab">mint cta</span>
  <button class="btn mint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>اعتماد</button>
  <button class="btn outline-mint">تأكيد</button>
</div>
<div class="row"><span class="lab">secondary</span>
  <button class="btn secondary">إلغاء</button>
  <button class="btn ghost">إعادة تعيين</button>
  <button class="btn danger">حذف نهائي</button>
</div>
<div class="row"><span class="lab">icon</span>
  <button class="icon-btn solid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
  <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg></button>
  <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09c0 .66.39 1.26 1 1.51a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.25.61.85 1 1.51 1H21a2 2 0 1 1 0 4h-.09c-.66 0-1.26.39-1.51 1Z"/></svg></button>
</div>
</body></html>
