<!doctype html><html><head><meta charset="utf-8"><title>Login surface</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>body{margin:0;padding:0;font-family:'IBM Plex Sans Arabic',Manrope,system-ui;direction:rtl;height:280px;overflow:hidden;position:relative;background:#0f172a;color:#fff}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:24px 24px;mask-image:radial-gradient(circle at 70% 50%,black 30%,transparent 75%)}
.glow{position:absolute;width:280px;height:280px;border-radius:9999px;background:radial-gradient(circle,#10b981 0%,transparent 65%);filter:blur(50px);opacity:.30;left:-80px;top:-80px}
.glow.b{background:radial-gradient(circle,#1e3a8a 0%,transparent 65%);opacity:.45;left:auto;right:-100px;top:auto;bottom:-100px}
.left{position:absolute;left:32px;top:32px;display:flex;flex-direction:column;gap:6px;z-index:1}
.mark{display:flex;align-items:center;gap:10px}
.mark .glyph{width:36px;height:36px;border-radius:10px;background:#fff;color:#0f172a;display:grid;place-items:center;font:800 16px Manrope;letter-spacing:-0.02em;position:relative}
.mark .glyph::after{content:'';position:absolute;width:10px;height:10px;border-radius:9999px;background:#10b981;top:-3px;inset-inline-end:-3px;box-shadow:0 0 0 2px #0f172a}
.mark .word{font:800 22px Manrope;letter-spacing:-0.025em}
.mark .word .a{color:#10b981}
.tagline{font:500 11px Manrope;color:#94a3b8;letter-spacing:0.02em}
.card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;background:rgba(15,23,42,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:22px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.card h3{margin:0 0 4px;font:800 18px 'IBM Plex Sans Arabic';color:#fff;letter-spacing:-0.01em}
.card p{margin:0 0 14px;font-size:11px;color:#94a3b8}
.fld{height:36px;border:1px solid rgba(255,255,255,.10);border-radius:12px;background:rgba(255,255,255,.04);margin-bottom:8px;display:flex;align-items:center;padding:0 12px;font-size:12px;color:#94a3b8}
.btn{height:38px;width:100%;border:none;background:#10b981;color:#022c22;border-radius:9999px;font:800 13px 'IBM Plex Sans Arabic';box-shadow:0 8px 24px hsl(160 84% 39%/.40);cursor:pointer}
</style></head><body>
<div class="grid"></div>
<div class="glow"></div><div class="glow b"></div>
<div class="left">
  <div class="mark"><div class="glyph">Z</div><div class="word">Z<span class="a">a</span>Feer</div></div>
  <div class="tagline">إدارة موارد بشرية · المملكة العربية السعودية</div>
</div>
<div class="card"><h3>تسجيل الدخول</h3><p>زفير — نظام إدارة الموظفين</p>
<div class="fld">name@company.com</div><div class="fld">••••••••••</div>
<button class="btn">تسجيل الدخول</button></div>
</body></html>
