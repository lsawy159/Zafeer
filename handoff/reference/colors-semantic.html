<!doctype html><html><head><meta charset="utf-8"><title>Semantic</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;padding:18px;background:#fff;font-family:Manrope,system-ui}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cell{border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;background:#fff}
.cell h4{margin:0;padding:10px 12px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:#0f172a}
.cell .scale{display:flex;height:28px}
.cell .scale span{flex:1}
.cell .pair{display:flex;gap:6px;padding:10px 12px;font-family:'IBM Plex Sans Arabic',Manrope,system-ui;direction:rtl}
.pair .pill{flex:1;font-size:11px;font-weight:600;border-radius:9999px;padding:5px 10px;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.pair .pill .dot{width:6px;height:6px;border-radius:9999px;background:currentColor}
.dot{width:10px;height:10px;border-radius:9999px;display:inline-block}
.note{font-size:10px;color:#475569;padding:0 12px 10px;font-family:ui-monospace,monospace}
</style></head><body>
<div class="grid">
<div class="cell"><h4>Success<span class="dot" style="background:hsl(160 84% 39%)"></span></h4>
<div class="scale"><span style="background:hsl(150 80% 94%)"></span><span style="background:hsl(156 72% 67%)"></span><span style="background:hsl(160 84% 39%)"></span><span style="background:hsl(163 94% 24%)"></span></div>
<div class="pair"><span class="pill" style="background:hsl(150 80% 94%);color:hsl(163 94% 18%)"><span class="dot"></span>ساري</span></div>
<div class="note">160° · also = brand accent</div></div>

<div class="cell"><h4>Warning<span class="dot" style="background:hsl(38 92% 50%)"></span></h4>
<div class="scale"><span style="background:hsl(48 96% 89%)"></span><span style="background:hsl(38 92% 66%)"></span><span style="background:hsl(38 92% 50%)"></span><span style="background:hsl(26 83% 24%)"></span></div>
<div class="pair"><span class="pill" style="background:hsl(48 96% 89%);color:hsl(26 83% 24%)"><span class="dot"></span>عاجل</span></div>
<div class="note">38° · upcoming expiry</div></div>

<div class="cell"><h4>Danger<span class="dot" style="background:hsl(0 72% 51%)"></span></h4>
<div class="scale"><span style="background:hsl(0 86% 94%)"></span><span style="background:hsl(0 72% 72%)"></span><span style="background:hsl(0 72% 51%)"></span><span style="background:hsl(0 70% 28%)"></span></div>
<div class="pair"><span class="pill" style="background:hsl(0 86% 94%);color:hsl(0 70% 28%)"><span class="dot"></span>طارئة</span></div>
<div class="note">0° · expired / critical</div></div>

<div class="cell"><h4>Info<span class="dot" style="background:hsl(217 91% 60%)"></span></h4>
<div class="scale"><span style="background:hsl(214 95% 93%)"></span><span style="background:hsl(217 91% 75%)"></span><span style="background:hsl(217 91% 60%)"></span><span style="background:hsl(217 91% 28%)"></span></div>
<div class="pair"><span class="pill" style="background:hsl(214 95% 93%);color:hsl(217 91% 28%)"><span class="dot"></span>معلومة</span></div>
<div class="note">217° · neutral notice</div></div>
</div>
</body></html>
